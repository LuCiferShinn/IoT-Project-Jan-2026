<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perak IoT Flight Analytics - Neon Cyberpunk</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        :root {
            /* Intense Purple & Neon Green Palette */
            --bg-deep: #0a0212;
            --card-purple: #16072b;
            --neon-green: #39ff14;
            --dim-green: #1a5c0a;
            --border-purple: #4b0082;
            --glow-purple: rgba(75, 0, 130, 0.6);
            --text-main: #d1c4e9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100vh; width: 100vw; 
            background: var(--bg-deep); 
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Balanced 2-Row, 3-Column Balanced Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 70px 1fr 1fr; /* Header + 2 equal rows */
            height: 100vh;
            gap: 15px;
            padding: 15px;
        }

        header {
            grid-column: 1 / -1;
            background: var(--card-purple);
            border: 2px solid var(--border-purple);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 0 20px var(--glow-purple);
        }

        header h1 { 
            font-size: 1.4rem; 
            color: var(--neon-green); 
            text-shadow: 0 0 10px var(--neon-green);
            letter-spacing: 3px; 
        }

        .kpi-container { display: flex; gap: 40px; }
        .kpi-stat { text-align: right; }
        .kpi-stat span { display: block; font-size: 0.65rem; color: var(--text-main); opacity: 0.7; }
        .kpi-stat b { font-size: 1.2rem; color: var(--neon-green); }

        /* Card Styling */
        .card {
            background: var(--card-purple);
            border: 1px solid var(--border-purple);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 0; /* Fixes flexbox overflow */
            position: relative;
        }

        .card:hover {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        .card h3 {
            font-size: 0.8rem;
            color: var(--neon-green);
            margin-bottom: 10px;
            text-transform: uppercase;
            border-left: 3px solid var(--neon-green);
            padding-left: 10px;
        }

        /* Content Areas */
        #map { 
            flex: 1; 
            border-radius: 4px; 
            border: 1px solid var(--border-purple);
        }

        .chart-container { flex: 1; position: relative; min-height: 0; }
        
        .table-wrap { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        th { text-align: left; color: var(--neon-green); padding: 8px; border-bottom: 1px solid var(--border-purple); }
        td { padding: 8px; border-bottom: 1px solid rgba(75, 0, 130, 0.3); }

        .neon-text { color: var(--neon-green); font-weight: bold; }
        .tag { border: 1px solid var(--neon-green); color: var(--neon-green); padding: 1px 4px; border-radius: 3px; font-size: 0.6rem; }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-purple); border-radius: 10px; }
    </style>
</head>
<body>

<div class="dashboard-grid">
    <header>
        <h1>SYSTEM::PERAK_IOT_v2.0</h1>
        <div class="kpi-container">
            <div class="kpi-stat"><span>UP_LINK</span><b id="totalVal">0</b></div>
            <div class="kpi-stat"><span>AVG_ALT</span><b id="altVal">0m</b></div>
            <div class="kpi-stat"><span>AVG_VEL</span><b id="velVal">0m/s</b></div>
        </div>
    </header>

    <div class="card">
        <h3>Hourly Density</h3>
        <div class="chart-container"><canvas id="hourChart"></canvas></div>
    </div>

    <div class="card">
        <h3>Live Telemetry Map</h3>
        <div id="map"></div>
    </div>

    <div class="card">
        <h3>Airport Inferences</h3>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>ID</th><th>EVT</th><th>LOC</th></tr>
                </thead>
                <tbody id="airportTable"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h3>Operational Log</h3>
        <div class="chart-container"><canvas id="dayChart"></canvas></div>
    </div>

    <div class="card">
        <h3>Altitude Distribution</h3>
        <div class="chart-container"><canvas id="altChart"></canvas></div>
    </div>

    <div class="card">
        <h3>Velocity Metrics</h3>
        <div class="chart-container"><canvas id="velChart"></canvas></div>
    </div>
</div>

<script>
    Chart.defaults.color = "#d1c4e9";
    const neonGreen = "#39ff14";

    // Initialize Map
    const map = L.map("map", { zoomControl: false }).setView([4.5, 101.0], 6); // Zoomed out slightly to see more
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    async function loadData() {
        try {
            // 1. Fetch KPI Summary
            const summaryRes = await fetch('/api/summary');
            const summaryData = await summaryRes.json();
            document.getElementById('totalVal').innerText = summaryData.total_flights;
            document.getElementById('altVal').innerText = summaryData.average_altitude + "m";
            document.getElementById('velVal').innerText = summaryData.average_velocity + "m/s";

            // 2. Fetch Table Data
            const tableRes = await fetch('/api/departure_airports');
            const tableData = await tableRes.json();
            const airportTable = document.getElementById('airportTable');
            airportTable.innerHTML = "";
            tableData.forEach((row) => {
                airportTable.innerHTML += `
                    <tr>
                        <td class="neon-text">${row.icao || 'N/A'}</td>
                        <td><span class="tag">DEP</span></td>
                        <td style="opacity:0.6">${row.airport}</td>
                    </tr>`;
            });

            // 3. Fetch Map Data and Plot Dots
            const mapRes = await fetch('/api/map_data');
            const mapData = await mapRes.json();
            
            mapData.forEach(flight => {
                if(flight.latitude && flight.longitude) {
                    L.circleMarker([flight.latitude, flight.longitude], {
                        radius: 3,
                        color: neonGreen,
                        fillColor: neonGreen,
                        fillOpacity: 0.8,
                        weight: 1
                    }).addTo(map);
                }
            });

            // 4. Fetch All Chart Data
            const hourRes = await fetch('/api/flights_per_hour');
            const hourData = await hourRes.json();

            const dayRes = await fetch('/api/flights_per_day');
            const dayData = await dayRes.json();

            const altRes = await fetch('/api/altitude_distribution');
            const altData = await altRes.json();

            const velRes = await fetch('/api/velocity_distribution');
            const velData = await velRes.json();

            // 5. Render charts
            renderCharts(hourData, dayData, altData, velData);

        } catch (error) {
            console.error("Error loading data from API:", error);
        }
    }

    // Helper function to format charts properly (including radar)
    function getConfig(type, labels, data) {
        let options = {
            maintainAspectRatio: false,
            plugins: { legend: { display: false } }
        };

        if (type === 'radar') {
            // Radar charts need a radial 'r' scale instead of x/y
            options.scales = {
                r: { 
                    grid: { color: 'rgba(75, 0, 130, 0.5)' },
                    angleLines: { color: 'rgba(75, 0, 130, 0.5)' },
                    pointLabels: { color: "#d1c4e9", font: { size: 10 } },
                    ticks: { display: false } // Hide inner numbers for a cleaner cyberpunk look
                }
            };
        } else {
            // Standard line/bar chart scales
            options.scales = {
                x: { grid: { display: false } },
                y: { grid: { color: 'rgba(75, 0, 130, 0.3)' }, beginAtZero: true }
            };
        }

        return {
            type: type,
            data: {
                labels: labels,
                datasets: [{
                    label: 'Metrics',
                    borderColor: neonGreen,
                    backgroundColor: 'rgba(57, 255, 20, 0.15)',
                    pointBackgroundColor: neonGreen,
                    pointBorderColor: '#000',
                    data: data,
                    fill: true,
                    tension: 0.4 // Smooth curves
                }]
            },
            options: options
        };
    }

    function renderCharts(hourData, dayData, altData, velData) {
        // Destroy old charts to prevent hover glitches
        Chart.helpers.each(Chart.instances, function(instance){
            instance.destroy();
        });

        // Initialize all charts with real database data
        new Chart(document.getElementById('hourChart'), getConfig('line', hourData.hours, hourData.counts));
        new Chart(document.getElementById('dayChart'), getConfig('bar', dayData.days, dayData.counts));
        new Chart(document.getElementById('altChart'), getConfig('line', altData.ranges, altData.counts));
        new Chart(document.getElementById('velChart'), getConfig('radar', velData.ranges, velData.counts));
    }

    window.onload = loadData;
</script>
</body>
</html>
